<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accedi - RinascitaDigitale</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --rosso-emergenza: #dc3545;
            --bianco-pulito: #ffffff;
            --grigio-scuro: #343a40;
            --verde-successo: #198754;
        }
        body {
            background: linear-gradient(135deg, var(--grigio-scuro) 0%, #1a1d20 100%);
            min-height: 100vh;
        }
        .bg-emergenza { background-color: var(--rosso-emergenza) !important; }
        .text-emergenza { color: var(--rosso-emergenza) !important; }
        .btn-emergenza { 
            background-color: var(--rosso-emergenza); 
            border-color: var(--rosso-emergenza); 
            color: var(--bianco-pulito);
        }
        .btn-emergenza:hover { 
            background-color: #bb2d3b; 
            border-color: #b02a37; 
            color: var(--bianco-pulito);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.5rem;
        }
        .login-card {
            max-width: 480px;
            margin: 0 auto;
        }
        .nav-tabs .nav-link {
            color: var(--grigio-scuro);
        }
        .nav-tabs .nav-link.active {
            color: var(--rosso-emergenza);
            border-bottom: 2px solid var(--rosso-emergenza);
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand text-emergenza d-flex align-items-center" href="index.html">
                RinascitaDigitale
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="login.html">Accedi</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Login/Register Card -->
    <div class="container py-5">
        <div class="login-card">
            <div class="card shadow-lg border-0">
                <div class="card-header bg-white border-0 pt-4">
                    <ul class="nav nav-tabs card-header-tabs justify-content-center" id="authTabs" role="tablist">
                        <li class="nav-item" role="presentation">
                            <button class="nav-link active fw-semibold px-4" id="login-tab" data-bs-toggle="tab" data-bs-target="#login" type="button" role="tab">
                                <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
                            </button>
                        </li>
                        <li class="nav-item" role="presentation">
                            <button class="nav-link fw-semibold px-4" id="register-tab" data-bs-toggle="tab" data-bs-target="#register" type="button" role="tab">
                                <i class="bi bi-person-plus me-2"></i>Registrati
                            </button>
                        </li>
                    </ul>
                </div>
                <div class="card-body p-4">
                    <div class="tab-content" id="authTabsContent">
                        
                        <!-- Login Tab -->
                        <div class="tab-pane fade show active" id="login" role="tabpanel">
                            <form id="loginForm" autocomplete="off">
                                <div class="mb-3">
                                    <label for="loginEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="loginEmail" placeholder="esempio@email.com" required autocomplete="off">
                                </div>
                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required autocomplete="new-password">
                                </div>
                                <div id="loginError" class="alert alert-danger d-none" role="alert"></div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="rememberMe">
                                    <label class="form-check-label" for="rememberMe">Ricordami</label>
                                </div>
                                <button type="submit" class="btn btn-emergenza w-100 py-2">
                                    <i class="bi bi-box-arrow-in-right me-2"></i>Accedi
                                </button>
                                <div class="text-center mt-3">
                                    <a href="#" class="text-muted small" id="forgotPasswordLink">Password dimenticata?</a>
                                </div>
                            </form>
                        </div>

                        <!-- Register Tab -->
                        <div class="tab-pane fade" id="register" role="tabpanel">
                            <form id="registerForm" autocomplete="off">
                                <div class="row">
                                    <div class="col-md-6 mb-3">
                                        <label for="registerNome" class="form-label">Nome</label>
                                        <input type="text" class="form-control" id="registerNome" placeholder="Mario" required autocomplete="off">
                                    </div>
                                    <div class="col-md-6 mb-3">
                                        <label for="registerCognome" class="form-label">Cognome</label>
                                        <input type="text" class="form-control" id="registerCognome" placeholder="Rossi" required autocomplete="off">
                                    </div>
                                </div>
                                <div class="mb-3">
                                    <label for="registerEmail" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="registerEmail" placeholder="esempio@email.com" required autocomplete="off">
                                </div>
                                <div class="mb-3">
                                    <label for="registerPassword" class="form-label">Password</label>
                                    <input type="password" class="form-control" id="registerPassword" placeholder="Minimo 8 caratteri" required autocomplete="new-password">
                                    <div class="form-text">Minimo 8 caratteri, una maiuscola, una minuscola e un carattere speciale.</div>
                                </div>
                                <!-- Aggiunto ruolo Cittadino nella registrazione -->
                                <div class="mb-3">
                                    <label for="registerRuolo" class="form-label">Registrati come <span class="text-danger">*</span></label>
                                    <select class="form-select" id="registerRuolo" required>
                                        <option value="">Seleziona il tuo ruolo...</option>
                                        <option value="cittadino">Cittadino (Segnala)</option>
                                        <option value="volontario">Volontario (Agisce)</option>
                                        <option value="donatore">Donatore (Offre Risorse)</option>
                                    </select>
                                </div>
                                <div class="mb-3 form-check">
                                    <input type="checkbox" class="form-check-input" id="acceptTerms" required>
                                    <label class="form-check-label" for="acceptTerms">
                                        Accetto i <a href="#" class="text-emergenza">Termini di Servizio</a>
                                    </label>
                                </div>
                                <button type="submit" class="btn btn-emergenza w-100 py-2">
                                    <i class="bi bi-person-plus me-2"></i>Registrati
                                </button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal Password Dimenticata -->
    <div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-labelledby="forgotPasswordModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="forgotPasswordModalLabel">
                        <i class="bi bi-envelope me-2"></i>Recupera Password
                    </h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <p class="text-muted">Inserisci l'email associata al tuo account per generare un link di reset password.</p>
                    <div class="mb-3">
                        <label for="resetEmail" class="form-label">Email</label>
                        <input type="email" class="form-control" id="resetEmail" placeholder="esempio@email.com" required autocomplete="off">
                    </div>
                    <div id="resetMessage" class="alert d-none" role="alert"></div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Annulla</button>
                    <button type="button" class="btn btn-emergenza" id="sendResetBtn" onclick="inviaResetPassword()">
                        <i class="bi bi-send me-2"></i>Invia Link di Reset
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // ── LOGIN ──────────────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const email    = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            errorDiv.classList.add('d-none');

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await resp.json();

                if (resp.ok && data.success) {
                    // Salva i dati utente in sessionStorage per le dashboard
                    sessionStorage.setItem('rd_utente_corrente', JSON.stringify(data.utente));
                    window.location.href = data.redirect;
                } else {
                    errorDiv.textContent = data.error || 'Credenziali non valide.';
                    errorDiv.classList.remove('d-none');
                }
            } catch (err) {
                errorDiv.textContent = 'Impossibile contattare il server. Assicurati che sia avviato (node server.js).';
                errorDiv.classList.remove('d-none');
            }
        });

        // ── REGISTRAZIONE ──────────────────────────────────
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const nome     = document.getElementById('registerNome').value;
            const cognome  = document.getElementById('registerCognome').value;
            const email    = document.getElementById('registerEmail').value;
            const password = document.getElementById('registerPassword').value;
            const ruolo    = document.getElementById('registerRuolo').value;

            if (!ruolo) {
                alert('Seleziona un ruolo per continuare.');
                return;
            }

            // Validazione password
            const pwdRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]).{8,}$/;
            if (!pwdRegex.test(password)) {
                alert('La password deve contenere almeno 8 caratteri, una lettera maiuscola, una minuscola e un carattere speciale.');
                return;
            }

            try {
                const resp = await fetch('/api/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ nome, cognome, email, password, ruolo })
                });
                const data = await resp.json();

                if (resp.ok && data.success) {
                    sessionStorage.setItem('rd_utente_corrente', JSON.stringify(data.utente));
                    alert('Registrazione completata con successo!');
                    window.location.href = data.redirect;
                } else {
                    alert(data.error || 'Errore durante la registrazione.');
                }
            } catch (err) {
                alert('Impossibile contattare il server. Assicurati che sia avviato (node server.js).');
            }
        });

        // Pre-seleziona ruolo nella registrazione da URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const roleParam = urlParams.get('role');
        if (roleParam) {
            document.getElementById('registerRuolo').value = roleParam;
        }

        // ── PASSWORD DIMENTICATA ───────────────────────────
        document.getElementById('forgotPasswordLink').addEventListener('click', function(e) {
            e.preventDefault();
            document.getElementById('resetEmail').value = '';
            document.getElementById('resetMessage').classList.add('d-none');
            document.getElementById('sendResetBtn').disabled = false;
            new bootstrap.Modal(document.getElementById('forgotPasswordModal')).show();
        });

        async function inviaResetPassword() {
            const email = document.getElementById('resetEmail').value;
            const msgDiv = document.getElementById('resetMessage');
            const btn = document.getElementById('sendResetBtn');

            if (!email) {
                msgDiv.className = 'alert alert-danger';
                msgDiv.textContent = 'Inserisci un indirizzo email.';
                msgDiv.classList.remove('d-none');
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Invio in corso...';

            try {
                const resp = await fetch('/api/password-reset/request', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await resp.json();

                if (resp.ok && data.success && data.resetLink) {
                    msgDiv.className = 'alert alert-success';
                    msgDiv.innerHTML = '<i class="bi bi-check-circle me-2"></i>Link generato!<br><a href="' + data.resetLink + '" class="fw-bold text-decoration-underline" target="_blank">Clicca qui per reimpostare la password</a>';
                    msgDiv.classList.remove('d-none');
                    btn.innerHTML = '<i class="bi bi-check-lg me-2"></i>Link Generato';
                } else {
                    msgDiv.className = 'alert alert-danger';
                    msgDiv.textContent = data.error || 'Email non trovata.';
                    msgDiv.classList.remove('d-none');
                    btn.disabled = false;
                    btn.innerHTML = '<i class="bi bi-send me-2"></i>Invia Link di Reset';
                }
            } catch (err) {
                msgDiv.className = 'alert alert-danger';
                msgDiv.textContent = 'Errore di connessione al server.';
                msgDiv.classList.remove('d-none');
                btn.disabled = false;
                btn.innerHTML = '<i class="bi bi-send me-2"></i>Invia Link di Reset';
            }
        }
    </script>
</body>
</html>
